<!DOCTYPE html>
<html lang="ko">

    <title>Spatial Agent - Advanced Visual RAG UI</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body { font-family: 'Pretendard', -apple-system, system-ui, sans-serif; padding: 20px; background-color: #f0f2f5; color: #1c1e21; }
        .container { max-width: 1300px; margin: 0 auto; background: white; padding: 35px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { font-size: 24px; color: #007bff; text-align: center; margin-bottom: 30px; }

        /* 입력 폼 */
        .form-group { margin-bottom: 20px; }
        input[type="text"], input[type="file"] { width: 100%; padding: 14px; border: 1.5px solid #e1e4e8; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 16px; background-color: #007bff; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.3s; }

        /* 지도 영역 */
        #map { height: 500px; width: 100%; margin: 25px 0; border-radius: 12px; border: 1px solid #d1d5da; }

        /* 결과 레이아웃 */
        .result-layout { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 25px; margin-top: 30px; display: none; width: 100%; }
        .card { background: #ffffff; border: 1px solid #e1e4e8; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); min-width: 0; overflow: hidden; }
        .card-title { font-size: 14px; font-weight: 800; color: #444; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }

        /* 마크다운 답변 박스 */
        .answer-box { line-height: 1.8; font-size: 15.5px; color: #24292e; word-break: keep-all; }
        .answer-box table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 14px; border-radius: 8px; overflow: hidden; }
        .answer-box th { background-color: #f6f8fa; border: 1px solid #d1d5da; padding: 10px 12px; font-weight: 600; text-align: left; }
        .answer-box td { border: 1px solid #d1d5da; padding: 10px 12px; }
        .answer-box tr:nth-child(even) { background-color: #fafbfc; }
        .answer-box strong { color: #d73a49; font-weight: 700; }

        pre { background: #1b1f23; color: #f6f8fa; padding: 15px; border-radius: 8px; font-size: 13px; overflow-x: auto; margin: 0; max-width: 100%; box-sizing: border-box; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
        .bg-spatial { background: #e1f5fe; color: #0288d1; }
        .bg-complex { background: #fff3cd; color: #856404; }

        /* 로딩 스피너 스타일 */
        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 로딩 중 버튼 상태 */
        .btn-submit:disabled {
            background-color: #a0cfff;
            cursor: not-allowed;
        }

    </style>

                <label style="display:block; margin-bottom:8px; font-weight:600;">질문 입력</label>
                <input type="text" id="query" placeholder="궁금한 공간 정보를 질문하세요 (예: SRT수서역에서 커피를 마시고 싶어)">

            <div class="form-group">
                <label style="display:block; margin-bottom:8px; font-weight:600;">사용자 파일명 (선택)</label>
                <input type="text" id="user_filename" placeholder="공간화할 파일 이름을 입력하세요">
            </div>

            <div class="form-group">
                <label style="display:block; margin-bottom:8px; font-weight:600;">파일 업로드</label>
                <input type="file" id="file" accept=".csv">
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <span id="btnText">분석 및 지식 검색 실행</span>

        marked.setOptions({ breaks: true, gfm: true });

        const VWORLD_API_KEY = "4496DD26-BD59-3D32-AC51-4D18177BA380";
        const epsg5179 = "+proj=tmerc +lat_0=38 +lon_0=127.5 +k=0.9996 +x_0=1000000 +y_0=2000000 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs";
        const epsg4326 = "+proj=longlat +ellps=WGS84 +datum=WGS84 +no_defs";

        let map = L.map('map').setView([37.487, 127.101], 15);
        L.tileLayer(`https://api.vworld.kr/req/wmts/1.0.0/${VWORLD_API_KEY}/Base/{z}/{y}/{x}.png`).addTo(map);
        let geojsonLayer = null;

        function transformTo4326(geojsonData) {
            if (!geojsonData || !geojsonData.features) return geojsonData;
            const data = JSON.parse(JSON.stringify(geojsonData));
            data.features.forEach(f => {
                if (!f.geometry && f.geometry_wkt) f.geometry = f.geometry_wkt;
                if (f.geometry) {
                    if (f.geometry.crs) delete f.geometry.crs;
                    if (f.geometry.coordinates) {
                        const type = f.geometry.type;
                        const c = f.geometry.coordinates;
                        const conv = (p) => proj4(epsg5179, epsg4326, [parseFloat(p[0]), parseFloat(p[1])]);
                        if (type === "Point") f.geometry.coordinates = conv(c);
                        else if (type === "Polygon" || type === "MultiLineString") f.geometry.coordinates = c.map(ring => ring.map(p => conv(p)));
                        else if (type === "MultiPolygon") f.geometry.coordinates = c.map(poly => poly.map(ring => ring.map(p => conv(p))));
                    }
                }
            });
            return data;
        }

        function cleanAndFormatMarkdown(raw) {
            if (!raw) return "답변을 생성할 수 없습니다.";
            let content = raw.includes("assistantfinal") ? raw.split("assistantfinal").pop() : raw;
            const bodyStart = content.search(/[#\d*]/);
            if (bodyStart !== -1) content = content.substring(bodyStart);
            return marked.parse(content.trim());
        }

        function updateMap(visual) {
            if (!visual) return;
            const converted = transformTo4326(visual);
            if (geojsonLayer) map.removeLayer(geojsonLayer);
            geojsonLayer = L.geoJSON(converted, {
                style: (feature) => ({
                    color: feature.properties.type === 'TARGET' ? "#ff4757" : "#007bff",
                    weight: feature.properties.type === 'TARGET' ? 5 : 2,
                    fillOpacity: feature.properties.type === 'TARGET' ? 0.5 : 0.2
                }),
                pointToLayer: (feature, latlng) => L.circleMarker(latlng, {
                    radius: 8,
                    fillColor: feature.properties.type === 'TARGET' ? "#ff4757" : "#007bff",
                    color: "#fff",
                    weight: 2,
                    fillOpacity: 0.8
                }),
                onEachFeature: (f, l) => {
                    let p = `<strong>${f.properties.type === 'TARGET' ? '🎯 분석 대상' : '📍 주변 정보'}</strong><hr>`;
                    Object.keys(f.properties).forEach(k => { if(k !== 'type') p += `<b>${k}:</b> ${f.properties[k]}<br>`; });
                    l.bindPopup(p);
                }
            }).addTo(map);
            if (geojsonLayer.getBounds().isValid()) map.fitBounds(geojsonLayer.getBounds(), { padding: [50, 50] });
        }

                } else {
                    // --- 기존 서버 통신 로직 ---
                    const formData = new FormData();
                    if (query) formData.append('query', query);
                    if (userFilename) formData.append('user_filename', userFilename);
                    if (file) formData.append('file', file);

                    const response = await fetch('/api/v1/agent/execute', { method: 'POST', body: formData });
                    const data = await response.json();
                    const display = data.results ? data.results[0] : data;

                    const attr = display.attribute || display.attribute_info;
                    document.getElementById('attribute-answer').innerHTML = cleanAndFormatMarkdown(attr ? attr.answer : "");

                    const route = display.decision ? display.decision.route : "ANALYSIS";
                    const badge = document.getElementById('route-badge');
                    badge.textContent = route;
                    badge.className = `badge ${route === 'COMPLEX' ? 'bg-complex' : 'bg-spatial'}`;
                    document.getElementById('reasoning').textContent = display.decision ? "Reasoning: " + display.decision.reasoning : "";
                    document.getElementById('generated-code').textContent = display.generated_code || "No Trace";

                    const visual = display.visualization || display.spatial;
                    if (visual) {
                        document.getElementById('raw-json').textContent = JSON.stringify(visual, null, 2);
                        updateMap(visual);
                    }
                }
